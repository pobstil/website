<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --white: #ffffff;
      --off-white: #f9f8f6;
      --ink: #1a1a18;
      --ink-light: #6b6b67;
      --border: rgba(26, 26, 24, 0.1);
      --duration: 800ms;
    }
 
    html, body {
      height: 100%;
      background: var(--white);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
 
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
 
    /* ── Main viewer ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
    }
 
    .viewer {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
 
    /* Image frame */
    .frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--off-white);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }
 
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity var(--duration) ease;
    }
 
    .frame img.visible {
      opacity: 1;
    }
 
    /* Loading shimmer */
    .frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
 
    .frame.loading::after { opacity: 1; }
 
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
 
    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }
 
    .caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--ink-light);
      letter-spacing: 0.01em;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
 
    .nav-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
 
    button {
      cursor: pointer;
      border: none;
      background: none;
      color: var(--ink-light);
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      padding: 0;
      line-height: 1;
      transition: color 0.2s;
    }
 
    button:hover { color: var(--ink); }
 
    /* Counter */
    .counter {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      text-transform: uppercase;
      flex-shrink: 0;
      text-align: right;
    }
 
    /* Error state */
    .error-msg {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-light);
      text-align: center;
      padding: 3rem;
      line-height: 1.8;
    }
 
    /* Interval bar */
    .progress-bar {
      height: 1px;
      background: var(--border);
      width: 80px;
      position: relative;
      overflow: hidden;
    }
 
    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: var(--ink);
      transition: width linear;
    }
 
    /* Responsive */
    @media (max-width: 600px) {
      main { padding: 2rem 1.25rem; }
      .controls { flex-wrap: wrap; gap: 0.75rem; }
      .caption { white-space: normal; font-size: 0.95rem; }
      .frame { aspect-ratio: 3 / 2; }
    }
  </style>
</head>
<body>
 
<main>
  <div class="viewer" id="viewer">
    <div class="frame loading" id="frame">
      <img id="img-a" alt="" />
      <img id="img-b" alt="" />
    </div>
 
    <div class="controls">
      <span class="caption" id="caption"></span>
      <div class="nav-group">
        <button id="btn-prev" aria-label="Previous photo">&lt;</button>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <button id="btn-next" aria-label="Next photo">&gt;</button>
      </div>
      <span class="counter" id="counter"></span>
    </div>
  </div>
</main>
 
<script>
  // ─── Configuration ───────────────────────────────────────────────────────────
  const INTERVAL_MS = 8000;   // Time between auto-advances (milliseconds)
  const PHOTOS_FILE = 'photos/photos.json';  // Path to your photos manifest
  // ─────────────────────────────────────────────────────────────────────────────
 
  const frame    = document.getElementById('frame');
  const imgA     = document.getElementById('img-a');
  const imgB     = document.getElementById('img-b');
  const caption  = document.getElementById('caption');
  const counter  = document.getElementById('counter');
  const fillBar  = document.getElementById('progress-fill');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
 
  let photos = [];
  let order  = [];      // shuffled index list
  let pos    = 0;       // current position in order[]
  let active = imgA;    // the img element currently shown
  let paused = false;
  let timer  = null;
  let fillTimer = null;
 
  // ── Load manifest ────────────────────────────────────────────────────────────
  fetch(PHOTOS_FILE)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      photos = data.photos || data;   // accept { photos: [...] } or plain array
      if (!photos.length) throw new Error('No photos listed.');
      init();
    })
    .catch(err => {
      frame.classList.remove('loading');
      frame.innerHTML = `<p class="error-msg">
        Could not load photos.<br>
        <small>${err.message}</small><br><br>
        Make sure <code>photos/photos.json</code> exists and lists your images.
      </p>`;
    });
 
  // ── Shuffle helper ───────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
 
  function buildOrder() {
    order = shuffle(photos.map((_, i) => i));
  }
 
  // ── Progress bar ─────────────────────────────────────────────────────────────
  function startProgressBar() {
    clearTimeout(fillTimer);
    fillBar.style.transition = 'none';
    fillBar.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fillBar.style.transition = `width ${INTERVAL_MS}ms linear`;
        fillBar.style.width = '100%';
      });
    });
  }
 
  function pauseProgressBar() {
    const computed = getComputedStyle(fillBar).width;
    const pct = (parseFloat(computed) / fillBar.parentElement.offsetWidth) * 100;
    fillBar.style.transition = 'none';
    fillBar.style.width = pct + '%';
  }
 
  // ── Show photo (crossfade) ────────────────────────────────────────────────────
  function showPhoto(idx, resetTimer = false) {
    const photo = photos[idx];
    const src   = typeof photo === 'string' ? photo : photo.src;
    const label = typeof photo === 'object' && photo.caption ? photo.caption : filename(src);
 
    const next = active === imgA ? imgB : imgA;
 
    frame.classList.add('loading');
    next.src = `photos/${src}`;
    next.alt = label;
 
    next.onload = () => {
      frame.classList.remove('loading');
      next.classList.add('visible');
      active.classList.remove('visible');
      active = next;
      caption.textContent = label;
      counter.textContent = `${pos + 1} / ${photos.length}`;
      if (resetTimer && !paused) scheduleNext();
      if (!paused) startProgressBar();
    };
 
    next.onerror = () => {
      frame.classList.remove('loading');
      advance(1);
    };
  }
 
  function filename(src) {
    return src.split('/').pop().replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
  }
 
  // ── Navigation ────────────────────────────────────────────────────────────────
  function advance(dir) {
    pos = (pos + dir + order.length) % order.length;
    // reshuffle when we've seen all photos
    if (pos === 0 && dir === 1) buildOrder();
    showPhoto(order[pos], true);
  }
 
  function scheduleNext() {
    clearTimeout(timer);
    timer = setTimeout(() => advance(1), INTERVAL_MS);
  }
 
  // ── Init ─────────────────────────────────────────────────────────────────────
  function init() {
    buildOrder();
    showPhoto(order[0]);
    scheduleNext();
    startProgressBar();
  }
 
  // ── Controls ─────────────────────────────────────────────────────────────────
  btnPrev.addEventListener('click', () => {
    clearTimeout(timer);
    advance(-1);
  });
 
  btnNext.addEventListener('click', () => {
    clearTimeout(timer);
    advance(1);
  });
 
  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { clearTimeout(timer); advance(-1); }
    if (e.key === 'ArrowRight') { clearTimeout(timer); advance(1); }
  });
</script>
 
</body>
</html>
